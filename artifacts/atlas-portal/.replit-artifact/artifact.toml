kind = "web"
previewPath = "/"
title = "Atlas Portal — Create Future Technologies"
version = "1.0.0"
id = "artifacts/atlas-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19133

[services.development]
run = "pnpm --filter @workspace/atlas-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/atlas-portal", "run", "build" ]
publicDir = "artifacts/atlas-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19133"
BASE_PATH = "/"
